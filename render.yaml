services:
  - type: static
    name: curiofy
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    headers:
      - path: '/*'
        name: 'Cache-Control'
        value: 'no-cache, must-revalidate, max-age=0'
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: curiofy-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: MONGO_URI
        fromSecret: true
      - key: GEMINI_API_KEY
        fromSecret: true
    headers:
      